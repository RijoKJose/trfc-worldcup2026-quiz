
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRFC Final Stable Version</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
<h1>TRFC WORLD CUP CHALLENGE 2026</h1>
<p>#NammudeClub</p>

<div id="countdown"></div>

<div class="buttons">
<button onclick="showSection('joinSection')">Join Quiz</button>
<button onclick="showLeaderboard(false)">Leaderboard</button>
<button onclick="showHelp()">Help</button>
<button onclick="showSection('adminSection')">Admin</button>
</div>
</header>

<section id="joinSection" class="hidden">
<h2>User Login</h2>

<input type="email" id="loginEmail" placeholder="Enter Email">

<button onclick="joinQuiz()">Continue</button>

<p>New User?</p>

<button onclick="showRegister()">Register</button>

<div id="registerBox" class="hidden">
<input type="text" id="name" placeholder="Full Name">
<input type="email" id="email" placeholder="Email">
<input type="text" id="phone" placeholder="Phone">

<button onclick="registerUser()">Register</button>
</div>
</section>

<section id="quizSection" class="hidden">
<h2>Live Quiz Arena</h2>

<h3 id="question"></h3>

<div id="options" class="options"></div>

<div class="timer">
Time Left: <span id="timer">15</span>s
</div>

<p id="result"></p>
</section>

<section id="leaderboardSection" class="hidden">
<h2>Leaderboard</h2>

<table id="leaderboardTable"></table>
</section>

<section id="adminSection" class="hidden">

<h2>Admin Login</h2>

<input type="password" id="adminPassword" placeholder="Password">

<button onclick="adminLogin()">Login</button>

<div id="dashboard" class="hidden">

<h3>Admin Dashboard</h3>

<button onclick="generateAIQuestions()">Generate AI Questions</button>
<button onclick="addQuestion()">Add Question</button>
<button onclick="startQuiz()">Start Quiz</button>

<button onclick="exportUsers()">Export Users</button>
<button onclick="exportLeaderboard()">Export Leaderboard</button>

<button onclick="clearLeaderboard()">Clear Leaderboard</button>
<button onclick="clearUsers()">Clear Users</button>

<h3>Point Settings</h3>

<label>Correct Answer Points</label>
<input type="number" id="correctPoints" value="2">

<label>Fastest Bonus Points</label>
<input type="number" id="fastestBonus" value="1">

<button onclick="saveSettings()">Save Settings</button>

<h3>Registered Users</h3>
<div id="usersList"></div>

<h3>Quiz Questions</h3>
<div id="questionsList"></div>

<h3>Leaderboard Management</h3>
<div id="leaderboardManage"></div>

</div>
</section>

<script src="app.js"></script>

</body>
</html>
